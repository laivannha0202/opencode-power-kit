name: verify

on:
  workflow_dispatch:
    # manual only — local validation (verify.sh/verify.ps1) is primary

jobs:
  verify:
    name: verify v1.9.0
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Install shfmt
        run: |
          sudo curl -sSLo /usr/local/bin/shfmt https://github.com/mvdan/sh/releases/download/v3.7.0/shfmt_v3.7.0_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt

      - name: Install PowerShell
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: formatting validation
        run: python3 scripts/validate-formatting.py

      - name: bash -n scripts
        run: |
          set -euo pipefail
          for f in scripts/*.sh verify.sh bin/opk; do
            bash -n "$f"
          done

      - name: shellcheck
        run: |
          set -euo pipefail
          shellcheck scripts/cleanup-agent-artifacts.sh \
                    scripts/install-gsd-core.sh \
                    scripts/integration-test.sh \
                    bin/opk \
                    verify.sh

      - name: shfmt check
        run: |
          set -euo pipefail
          # Scope to .sh files only — bin/opk is intentionally kept in the
          # 2-space / "a|b)" style established by v1.3.3 to avoid a noisy
          # style-only churn. shellcheck still runs against bin/opk.
          shfmt -d scripts/*.sh verify.sh

      - name: PowerShell syntax parse
        run: |
          set -euo pipefail
          pwsh -NoProfile -Command "
            \$psFiles = @(
              'verify.ps1',
              'bin/opk.ps1',
              'install-global.ps1',
              'bootstrap.ps1',
              'setup.ps1',
              'install.ps1',
              'update-bmad.ps1',
              'scripts/install-gsd-core.ps1',
              'scripts/install-markitdown.ps1',
              'scripts/install-supermemory.ps1',
              'scripts/install-taste-skill.ps1',
              'scripts/check-taste-skill.ps1',
              'scripts/install-safety-plugin.ps1',
              'scripts/install-fullstack-profile.ps1'
            )
            foreach (\$f in \$psFiles) {
              if (-not (Test-Path \$f)) { continue }
              \$errs = \$null
              [System.Management.Automation.Language.Parser]::ParseFile(\$f, [ref]\$null, [ref]\$errs) | Out-Null
              if (\$errs -and \$errs.Count -gt 0) {
                Write-Host \"PARSE FAIL: \$f\"; exit 1
              }
              Write-Host \"ok parse: \$f\"
            }
          "

      - name: verify.sh
        run: bash verify.sh

      - name: verify.ps1
        run: pwsh -NoProfile -File verify.ps1 -NoPython

      - name: python validate
        run: python3 scripts/validate-opencode-pack.py

      - name: upstream audit
        run: python3 scripts/audit-upstreams.py --check

      - name: integration test
        run: bash scripts/integration-test.sh
